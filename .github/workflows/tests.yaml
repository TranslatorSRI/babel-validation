name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Run unit tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run pytest tests/github_issues/test_system.py tests/test_environment -m unit -v
