[project]
name = "babel-validation"
version = "0.1.0"
description = "A set of programs for validating the output of the Babel pipelines."
license = "MIT"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "black>=25.9.0",
    "click>=8.1",
    "pyyaml>=6.0",
    "requests>=2.32.5",
    "tqdm>=4.67.1",
    "filelock",
    "deepdiff>=8.6.1",
    "python-dotenv>=0.9.9",
    "openapi-spec-validator>=0.7.2",
    "pygithub>=2.8.1",
    "pytest>=9.0.2",
    "pytest-timeout>=2.4.0",
    "pytest-xdist[psutil]",
    "pytest-subtests",
]

[project.urls]
Repository = "https://github.com/TranslatorSRI/babel-validation"

[project.scripts]
csv-to-babeltests = "src.babel_validation.tools.csv_to_babeltests:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Package the entire `src/` directory so existing imports
# (`from src.babel_validation.X import Y`) continue to work after install.
packages = ["src"]

[tool.pytest.ini_options]
timeout = 300
markers = [
    "unit: unit tests that do not require network access",
]
